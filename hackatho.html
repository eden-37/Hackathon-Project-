<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver • Cashless</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; background:#0a1428; color:white; }
.display { font-family:'Space Grotesk', sans-serif; }

.glass {
  background: rgba(15,23,42,0.9);
  backdrop-filter: blur(25px);
  border:1px solid rgba(255,255,255,0.1);
}

.ethio-gradient {
  background: linear-gradient(135deg,#006400,#FCD116,#DA121A);
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="fixed top-0 w-full h-16 bg-slate-950/90 backdrop-blur-xl flex items-center px-6 border-b border-white/10">
  <div class="flex items-center gap-3">
    <div class="text-2xl">🚖</div><h1 class="display text-2xl text-[#FCD116]">Cashless</h1>

  </div>
</header>

<main class="pt-20 px-5">

<!-- REGISTER -->
<div id="screen-info" class="max-w-md mx-auto glass p-6 rounded-3xl">
  <h2 class="display text-3xl mb-6">Driver Setup</h2>

  <input id="fullName" placeholder="Full Name" class="w-full p-4 mb-4 rounded-xl bg-white/10 border border-white/10">
  <input id="phone" placeholder="Phone" class="w-full p-4 mb-4 rounded-xl bg-white/10 border border-white/10">
  <input id="plate" placeholder="Plate Number" class="w-full p-4 mb-4 rounded-xl bg-white/10 border border-white/10">
  <input id="car" placeholder="Car Model" class="w-full p-4 mb-6 rounded-xl bg-white/10 border border-white/10">

  <button onclick="saveDriverInfo()" class="w-full py-5 ethio-gradient text-black font-bold rounded-2xl text-lg">
    Generate QR
  </button>
</div>

<!-- DASHBOARD -->
<div id="screen-dashboard" class="hidden max-w-md mx-auto">

  <div class="glass p-6 rounded-3xl mb-6">
    <h2 id="driverName" class="display text-2xl mb-2"></h2>
    <p id="driverCar" class="text-slate-400"></p>
  </div>

  <!-- QR -->
  <div class="glass p-6 rounded-3xl text-center">
    <h3 class="text-xl mb-4">Your QR Code</h3>
    <div id="qrCode" class="flex justify-center"></div>

    <button onclick="generateQRCode()" 
      class="mt-6 w-full py-4 bg-white text-black rounded-2xl font-semibold">
      Refresh QR
    </button>
  </div>

  <!-- STATS -->
  <div class="grid grid-cols-2 gap-4 mt-6">
    <div class="glass p-5 rounded-2xl text-center">
      <p class="text-slate-400 text-sm">Earnings</p>
      <h3 id="earnings" class="text-2xl text-yellow-400">ETB 0</h3>
    </div>
    <div class="glass p-5 rounded-2xl text-center">
      <p class="text-slate-400 text-sm">Trips</p>
      <h3 id="trips" class="text-2xl">0</h3>
    </div>
  </div>

</div>

</main>

<script>
let driver = {};
let qr;

function saveDriverInfo() {
  const name = document.getElementById("fullName").value;
  const phone = document.getElementById("phone").value;
  const plate = document.getElementById("plate").value;
  const car = document.getElementById("car").value;

  if (!name || !phone || !plate || !car) {
    alert("Fill all fields");
    return;
  }

  driver = { name, phone, plate, car };

  document.getElementById("screen-info").classList.add("hidden");
  document.getElementById("screen-dashboard").classList.remove("hidden");

  document.getElementById("driverName").textContent = name;
  document.getElementById("driverCar").textContent = car + " • " + plate;

  generateQRCode();
}

// MATCH CLIENT FORMAT
function generateQRCode() {
  const container = document.getElementById("qrCode");
  container.innerHTML = "";

  // VERY IMPORTANT: match client scanner format
  const qrData = `Bole|Piassa|5|12|50`;

  qr = new QRCode(container, {
    text: qrData,
    width: 220,
    height: 220
  });
}
</script>

</body>
</html>
